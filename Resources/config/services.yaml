    autowire: true
    autoconfigure: true
    public: true

  OswisOrg\OswisCalendarBundle\Repository\ParticipantNote\ParticipantManualNoteRepository:
    autowire: true
    autoconfigure: true
    tags: ['doctrine.repository_service']

  OswisOrg\OswisCalendarBundle\Repository\Imap\ImapSyncStateRepository:
    autowire: true
    autoconfigure: true
    tags: ['doctrine.repository_service']

  OswisOrg\OswisCalendarBundle\Repository\Imap\ParticipantIncomingMailRepository:
