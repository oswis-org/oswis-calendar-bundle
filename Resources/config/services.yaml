  OswisOrg\OswisCalendarBundle\Repository\Imap\ParticipantUnmatchedMailRepository:
    autowire: true
    autoconfigure: true
    tags: ['doctrine.repository_service']

  OswisOrg\OswisCalendarBundle\Service\Imap\ImapFetchService:
    autowire: true
    autoconfigure: true
    arguments:
      $imapHost: '%env(OSWIS_IMAP_HOST)%'
      $imapPort: '%env(int:OSWIS_IMAP_PORT)%'
      $imapEncryption: '%env(OSWIS_IMAP_ENCRYPTION)%'
      $imapUser: '%env(OSWIS_IMAP_USER)%'
      $imapPassword: '%env(OSWIS_IMAP_PASSWORD)%'
      $foldersToSync: '%env(OSWIS_IMAP_FOLDERS_TO_SYNC)%'
      $enabled: '%env(bool:OSWIS_IMAP_ENABLED)%'

