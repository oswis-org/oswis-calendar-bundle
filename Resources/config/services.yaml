  OswisOrg\OswisCalendarBundle\Controller\WebAdmin\WebAdminEventController:
    autowire: true
    autoconfigure: true
    public: true

  OswisOrg\OswisCalendarBundle\Controller\WebAdmin\WebAdminAdHocMailController:
